services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pba
      POSTGRES_USER: pba
      POSTGRES_PASSWORD: pba_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pba -d pba"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    command: ["gunicorn", "-k", "uvicorn.workers.UvicornWorker", "apps.control_plane.app.main:app", "-b", "0.0.0.0:8000", "--workers", "2", "--timeout", "60"]

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["bash", "-lc", "rq worker --url \"$REDIS_URL\" default"]

  scheduler:
    build:
      context: ../../
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
    command: ["bash", "-lc", "rqscheduler --url \"$REDIS_URL\""]

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config: